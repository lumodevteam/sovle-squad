name: Export and Deploy Godot Game to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot Engine
        run: |
          wget https://downloads.tuxfamily.org/godotengine/4.5/Godot_v4.5-stable_linux.x86_64.zip
          unzip Godot_v4.5-stable_linux.x86_64.zip
          sudo mv Godot_v4.5-stable_linux.x86_64 /usr/local/bin/godot
          
      - name: Install Godot Export Templates
        run: |
          wget https://downloads.tuxfamily.org/godotengine/4.5/Godot_v4.5-stable_export_templates.tpz
          unzip Godot_v4.5-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.5.stable
          mv templates/* ~/.local/share/godot/export_templates/4.5.stable/

      - name: Build Web Export
        run: |
          mkdir -p build/web
          # The "Web" below must perfectly match the name of your preset in Godot
          godot --headless --export-release "Web" build/web/index.html
          
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Point the uploader to the directory where Godot just saved the export
          path: './docs'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
